<!DOCTYPE html>
<html>
<head>
    <title>Report Issue - Snares Linux</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="navbar">
    <div class="navbar-left">
        <img src="../images/logo.png" class="nav-logo">
    </div>

    <div class="navbar-center">
        <a href="../index.html">Home</a>
        <a href="../documentation.html">Documentation</a>
        <a href="../download.html">Download</a>
    </div>

    <div class="navbar-right"></div>
</div>

<div class="content">

    <h1>Report a Problem</h1>

    <div class="doc-card">

        <form id="reportForm">

            <label>Title</label><br>
            <input type="text" id="title" style="width:100%"><br><br>

            <label>Description</label><br>
            <textarea id="desc" style="width:100%; height:150px"></textarea><br><br>

            <button type="submit">Submit to GitHub</button>

        </form>

    </div>

</div>

<script>
document.getElementById("reportForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const title = encodeURIComponent(document.getElementById("title").value);
    const desc = encodeURIComponent(document.getElementById("desc").value);

    const url =
        "https://github.com/snareslinux/snareslinux.github.io/issues/new" +
        "?title=" + title +
        "&body=" + desc;

    window.open(url, "_blank");
});
</script>

</body>
</html>
